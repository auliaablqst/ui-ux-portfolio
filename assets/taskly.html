<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taskly — To-Do App</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #F0F4FF;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 3rem 1rem;
  }

  .app {
    width: 100%;
    max-width: 480px;
  }

  /* Header */
  .header {
    margin-bottom: 2rem;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .logo {
    font-size: 22px;
    font-weight: 600;
    color: #1A1A2E;
    letter-spacing: -0.03em;
  }
  .logo span { color: #4F6EF7; }
  .date {
    font-size: 12px;
    color: #9A9AB0;
  }
  .subtitle {
    font-size: 13px;
    color: #9A9AB0;
  }

  /* Stats */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .stat-card {
    background: white;
    border-radius: 14px;
    padding: 14px;
    text-align: center;
    box-shadow: 0 1px 3px rgba(0,0,0,.05);
  }
  .stat-val {
    font-size: 24px;
    font-weight: 600;
    color: #1A1A2E;
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-label {
    font-size: 11px;
    color: #9A9AB0;
  }
  .stat-card.blue .stat-val { color: #4F6EF7; }
  .stat-card.green .stat-val { color: #22C55E; }
  .stat-card.amber .stat-val { color: #F59E0B; }

  /* Input */
  .input-wrap {
    background: white;
    border-radius: 14px;
    padding: 6px 6px 6px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 1.25rem;
    box-shadow: 0 1px 3px rgba(0,0,0,.05);
  }
  .input-wrap input {
    flex: 1;
    border: none;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: #1A1A2E;
    background: transparent;
  }
  .input-wrap input::placeholder { color: #C4C4D4; }
  .add-btn {
    background: #4F6EF7;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: background .15s;
    white-space: nowrap;
  }
  .add-btn:hover { background: #3B57E8; }

  /* Filter tabs */
  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 1rem;
  }
  .tab {
    font-size: 12px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    padding: 5px 14px;
    border-radius: 99px;
    border: 1.5px solid #E4E7FF;
    background: white;
    color: #9A9AB0;
    cursor: pointer;
    transition: all .15s;
  }
  .tab.active {
    background: #4F6EF7;
    border-color: #4F6EF7;
    color: white;
  }

  /* Task list */
  .task-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .task-item {
    background: white;
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 1px 3px rgba(0,0,0,.05);
    transition: transform .15s, opacity .2s;
    animation: slideIn .2s ease;
  }
  .task-item:hover { transform: translateY(-1px); }
  .task-item.done { opacity: .5; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .check-btn {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid #E4E7FF;
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    transition: all .15s;
    color: transparent;
  }
  .check-btn.checked {
    background: #22C55E;
    border-color: #22C55E;
    color: white;
  }

  .task-text {
    flex: 1;
    font-size: 14px;
    color: #1A1A2E;
    transition: all .2s;
  }
  .task-text.done {
    text-decoration: line-through;
    color: #C4C4D4;
  }

  .task-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .task-cat {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 99px;
    font-weight: 500;
  }
  .cat-work { background: #EEF1FF; color: #4F6EF7; }
  .cat-personal { background: #FFF3E0; color: #F59E0B; }
  .cat-study { background: #E8FFF2; color: #22C55E; }

  .delete-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #C4C4D4;
    font-size: 14px;
    padding: 2px;
    line-height: 1;
    transition: color .15s;
  }
  .delete-btn:hover { color: #EF4444; }

  /* Priority dot */
  .priority {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .p-high { background: #EF4444; }
  .p-mid  { background: #F59E0B; }
  .p-low  { background: #22C55E; }

  /* Empty */
  .empty {
    text-align: center;
    padding: 3rem 0;
    color: #C4C4D4;
    font-size: 14px;
  }
  .empty-icon { font-size: 2.5rem; margin-bottom: .75rem; }

  /* Progress bar */
  .progress-wrap {
    background: white;
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 1.25rem;
    box-shadow: 0 1px 3px rgba(0,0,0,.05);
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #9A9AB0;
    margin-bottom: 8px;
  }
  .progress-bar-bg {
    height: 6px;
    background: #F0F4FF;
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #4F6EF7, #818CF8);
    border-radius: 99px;
    transition: width .4s ease;
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="logo">Task<span>ly</span></div>
      <div class="date" id="dateEl"></div>
    </div>
    <div class="subtitle">Kelola tugasmu hari ini</div>
  </div>

  <div class="stats">
    <div class="stat-card blue">
      <div class="stat-val" id="statTotal">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-card green">
      <div class="stat-val" id="statDone">0</div>
      <div class="stat-label">Selesai</div>
    </div>
    <div class="stat-card amber">
      <div class="stat-val" id="statLeft">0</div>
      <div class="stat-label">Tersisa</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-label">
      <span>Progress hari ini</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
    </div>
  </div>

  <div class="input-wrap">
    <input type="text" id="taskInput" placeholder="Tambah tugas baru..." maxlength="60" />
    <button class="add-btn" onclick="addTask()">+ Tambah</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="setFilter('all', this)">Semua</button>
    <button class="tab" onclick="setFilter('active', this)">Aktif</button>
    <button class="tab" onclick="setFilter('done', this)">Selesai</button>
  </div>

  <div class="task-list" id="taskList"></div>
</div>

<script>
  const CATS = ['work','personal','study']
  const CAT_LABELS = { work: 'Kerja', personal: 'Personal', study: 'Belajar' }
  const PRIORITIES = ['high','mid','low']

  let filter = 'all'
  let tasks = [
    { id: 1, text: 'Riset referensi desain UI dashboard', done: false, cat: 'work', priority: 'high' },
    { id: 2, text: 'Buat wireframe halaman utama', done: false, cat: 'work', priority: 'high' },
    { id: 3, text: 'Review feedback dari mentor', done: true, cat: 'study', priority: 'mid' },
    { id: 4, text: 'Update portofolio Figma', done: false, cat: 'personal', priority: 'mid' },
    { id: 5, text: 'Kerjakan tugas UX Research', done: false, cat: 'study', priority: 'low' },
  ]
  let nextId = 6

  // Date
  const now = new Date()
  document.getElementById('dateEl').textContent = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' })

  function setFilter(f, el) {
    filter = f
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
    el.classList.add('active')
    render()
  }

  function addTask() {
    const input = document.getElementById('taskInput')
    const text = input.value.trim()
    if (!text) return
    tasks.unshift({
      id: nextId++,
      text,
      done: false,
      cat: CATS[Math.floor(Math.random() * CATS.length)],
      priority: PRIORITIES[Math.floor(Math.random() * PRIORITIES.length)]
    })
    input.value = ''
    render()
  }

  function toggleTask(id) {
    tasks = tasks.map(t => t.id === id ? { ...t, done: !t.done } : t)
    render()
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id)
    render()
  }

  function render() {
    const list = document.getElementById('taskList')
    const done = tasks.filter(t => t.done).length
    const total = tasks.length
    const pct = total ? Math.round(done / total * 100) : 0

    document.getElementById('statTotal').textContent = total
    document.getElementById('statDone').textContent = done
    document.getElementById('statLeft').textContent = total - done
    document.getElementById('progressPct').textContent = pct + '%'
    document.getElementById('progressBar').style.width = pct + '%'

    const filtered = tasks.filter(t =>
      filter === 'all' ? true : filter === 'done' ? t.done : !t.done
    )

    if (!filtered.length) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">✅</div><div>Tidak ada tugas di sini</div></div>`
      return
    }

    list.innerHTML = filtered.map(t => `
      <div class="task-item ${t.done ? 'done' : ''}">
        <div class="priority p-${t.priority}"></div>
        <button class="check-btn ${t.done ? 'checked' : ''}" onclick="toggleTask(${t.id})">
          ${t.done ? '✓' : ''}
        </button>
        <span class="task-text ${t.done ? 'done' : ''}">${t.text}</span>
        <div class="task-right">
          <span class="task-cat cat-${t.cat}">${CAT_LABELS[t.cat]}</span>
          <button class="delete-btn" onclick="deleteTask(${t.id})">✕</button>
        </div>
      </div>
    `).join('')
  }

  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask()
  })

  render()
</script>
</body>
</html>
